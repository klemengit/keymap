# keymenu example configuration
# Copy this file to ~/.config/keymenu/config.toml and customize it.
#
# Structure:
#   [settings]           — optional display/behaviour settings
#   [shortcuts.KEY]      — top-level shortcut (KEY = exactly one character)
#     label = "..."      — description shown in the menu
#     action = "..."     — leaf node: url | app | shell | text
#     value  = "..."     — leaf node: the target
#   [shortcuts.KEY.SUBKEY]  — nested group (no extra 'shortcuts' wrapper needed)
#   [[commands]]         — named actions without a shortcut; accessible via / fuzzy search
#     label  = "..."     — name shown in search results
#     action = "..."     — url | app | shell | text
#     value  = "..."     — the target

# ---------------------------------------------------------------------------
# Global settings (all optional — defaults shown)
# ---------------------------------------------------------------------------
[settings]
terminal = "alacritty"        # terminal used to open nvim and shell actions
font     = "Monospace 13"     # GTK font string (family + size)
width    = 420                # window width in pixels
instant_search = false   # require / to open search (default: true)

# ---------------------------------------------------------------------------
# Shortcuts
# ---------------------------------------------------------------------------

# --- Group: GitHub ----------------------------------------------------------
[shortcuts.g]
label = "GitHub"

[shortcuts.g.r]
label  = "My Repo"
action = "url"
value  = "https://github.com/username/myrepo"

[shortcuts.g.p]
label  = "Pull Requests"
action = "url"
value  = "https://github.com/pulls"

[shortcuts.g.n]
label  = "New Issue"
action = "url"
value  = "https://github.com/username/myrepo/issues/new"

# --- App shortcuts ----------------------------------------------------------
[shortcuts.t]
label  = "Terminal"
action = "app"
value  = "kitty"
# Focus the existing window if kitty is already running; launch otherwise.

[shortcuts.n]
label  = "Notes (Obsidian)"
action = "app"
value  = "obsidian"

# --- Shell shortcuts --------------------------------------------------------
[shortcuts.s]
label  = "Search the Web"
action = "shell"
value  = "xdg-open 'https://google.com'"

[shortcuts.h]
label  = "Open Home Folder"
action = "shell"
value  = "nautilus ~"

# --- Text (paste) shortcuts -------------------------------------------------
[shortcuts.p]
label  = "Paste Email Signature"
action = "text"
value  = "Jane Doe\njane@example.com\n+1 555 0100"
# The window hides first, then the text is typed at the cursor after 150 ms.

# ---------------------------------------------------------------------------
# Commands — no shortcut key; accessible via / fuzzy search
# Add as many [[commands]] blocks as you like.
# ---------------------------------------------------------------------------

[[commands]]
label  = "Hacker News"
action = "url"
value  = "https://news.ycombinator.com"

[[commands]]
label  = "Lobsters"
action = "url"
value  = "https://lobste.rs"

[[commands]]
label  = "Restart NetworkManager"
action = "shell"
value  = "sudo systemctl restart NetworkManager"

[[commands]]
label  = "Screenshot (area)"
action = "shell"
value  = "gnome-screenshot -a"

[[commands]]
label  = "My work email"
action = "text"
value  = "jane@example.com"
